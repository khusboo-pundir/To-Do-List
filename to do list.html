<!DOCTYPE html>
<html>
<head>
  <title>To do List</title>
  <style>
    body {
      background-color: #b894b3;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 60px;
    }

    .container {
      background: white;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 400px;
    }

    h2 {
      color: #121213;
      margin-bottom: 15px;
    }

    input[type="text"] {
      padding: 10px;
      width: 65%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px 14px;
      margin-left: 5px;
      border: none;
      border-radius: 4px;
      color: rgb(175, 170, 170);
      cursor: pointer;
    }

    .add-btn {
      background-color: #5ca9cc;
    }

    .edit-btn {
      background-color: rgb(61, 197, 79);
    }

    .delete-btn {
      background-color: rgb(238, 37, 37);
    }

    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .task span {
      flex: 1;
    }

    .task button {
      margin-left: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>To do List</h2>
    <input type="text" id="taskInput" placeholder="Add Todo">
    <button class="add-btn" onclick="addTask()">Add</button>

    <div id="taskList"></div>
  </div>

  <script>
    function addTask() {
      const taskInput = document.getElementById("taskInput");
      const taskText = taskInput.value.trim();
      if (taskText === "") return;

      const taskDiv = document.createElement("div");
      taskDiv.className = "task";

      const span = document.createElement("span");
      span.innerText = taskText;

      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.innerText = "Edit";
      editBtn.onclick = function () {
        const updated = prompt("Edit task:", span.innerText);
        if (updated !== null && updated.trim() !== "") {
          span.innerText = updated.trim();
        }
      };

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.innerText = "delete";
      deleteBtn.onclick = function () {
        taskDiv.remove();
      };

      taskDiv.appendChild(span);
      taskDiv.appendChild(editBtn);
      taskDiv.appendChild(deleteBtn);

      document.getElementById("taskList").appendChild(taskDiv);
      taskInput.value = "";
    }
  </script>

</body>
</html>
